map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream employee_nhf_nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name approve.baitongtestdeploy.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name approve.baitongtestdeploy.online;

    # Cloudflare Origin Certificate.
    ssl_certificate     /etc/ssl/cloudflare/approve.baitongtestdeploy.online.pem;
    ssl_certificate_key /etc/ssl/cloudflare/approve.baitongtestdeploy.online.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    client_max_body_size 8m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_next/static/ {
        proxy_pass http://employee_nhf_nextjs;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/uploads/ {
        proxy_pass http://employee_nhf_nextjs;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://employee_nhf_nextjs;
        proxy_cache_bypass $http_upgrade;
    }
}
