services:
    mysql-integration:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_INTEGRATION_ROOT_PASSWORD:?required}
            MYSQL_DATABASE: ${MYSQL_INTEGRATION_DATABASE:?required}
            MYSQL_USER: ${MYSQL_INTEGRATION_USER:?required}
            MYSQL_PASSWORD: ${MYSQL_INTEGRATION_PASSWORD:?required}
            TZ: Asia/Bangkok
        command: >
            --character-set-server=utf8mb4
            --collation-server=utf8mb4_unicode_ci
            --default-authentication-plugin=caching_sha2_password
            --innodb-lock-wait-timeout=5
            --log-bin-trust-function-creators=1
        ports:
            - "127.0.0.1:${MYSQL_INTEGRATION_PORT:-3309}:3306"
        tmpfs:
            - /var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
            interval: 2s
            timeout: 2s
            retries: 30
            start_period: 10s
